<!doctype html>
<html lang="ja">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="./index_styles.css">
		<title>無料診断のお問い合わせ</title>
	</head>

<body>

	<!-- ヘッダー読み込み -->
	<div id="header"></div>
	
	<main>
<section class="diagnosis">
  <!-- 左側 -->
  <div class="diagnosis-text">

    <h1>
      無料診断をお申しください。
    </h1>
    <p>ご入力内容をもとに、貴社の状況を確認します。無料診断の詳細はメールにてご案内いたします。</p>

    <h2>診断でわかること</h2>

    <div class="line"></div>

    <p>まずはお気軽にお問い合わせください。</p>
  </div>

  <!-- 右側フォーム -->
  <div class="contact-form">
    <h2>お問い合わせ</h2>
    <form>
      <label>会社名</label>
      <input type="text">
      <label>お名前</label>
      <input type="text">
      <label>メールアドレス</label>
      <input type="email">
      <label>お問い合わせ内容</label>
      <button>送信する</button>
    </form>
  </div>
</section>

</main>

	<!-- フッター読み込み -->
	<div id="footer"></div>

	<script src="./js/main.js"></script>
	</body>

</html>
