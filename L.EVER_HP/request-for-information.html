<!doctype html>
<html lang="ja">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="./css/request-for-information.css">
		<link rel="stylesheet" href="./css/header.css">
		<link rel="stylesheet" href="./css/footer.css">
		<title>資料請求のお問い合わせ｜株式会社L.EVER</title>
	</head>
  <body>

    <!-- ヘッダー読み込み -->
    <div id="header"></div>
    
    <main>
      <section class="diagnosis">
       <!-- 左側 -->
      <div class="diagnosis-text">

        <h1>資料請求をお申し込み下さい。</h1>

        <p>ご入力内容をもとに、貴社の状況を確認します。
          資料請求の詳細はメールにてご案内いたします。。</p>
      </div>

    <!-- 右側フォーム -->
    <div class="contact-form">
      <form class="form-grid">
        <div class="form-field">
          <label>会社名</label>
          <input type="text" name="conpanyName" placeholder="例）株式会社L.EVER" required>
        </div>

        <div class="form-field">
          <label>担当者名</label>
          <input type="text" name="PersonInChargeName" placeholder="例）山田 太郎" required>
        </div>

        <div class="form-field">
          <label>メールアドレス</label>
          <input type="email" name="email" placeholder="例）info@lever.jp" required>
        </div>

        <div class="form-field">
          <label>電話番号</label>
          <input type="tel" name="tel"  pattern="[0-9]{10,11}" placeholder="例）0120399137" required 
          inputmode="numeric" title="電話番号はハイフンなしの10桁または11桁で入力してください。">
        </div>

        <div class="form-field">
          <label>大業種</label>
          <select id="mainIndustry" required>
            <option value="">選択してください</option>
            <option value="btob">BtoBサービス・IT</option>
            <option value="consulting">コンサル・士業・専門サービス</option>
            <option value="maker">製造・メーカー・卸</option>
            <option value="realestate">不動産・建設・住宅</option>
            <option value="medical">医療・美容・福祉</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="form-field">
          <label>小業種</label>
          <select id="subIndustry" required>
            <option>大業種を選択してください</option>
          </select>
        </div>

        <div class="form-field form-full">
          <label>ご質問・ご要望など</label>
          <textarea placeholder="現在の課題や相談したい内容をご記入ください"></textarea>
        </div>

        <div class="form-actions form-full">
          <button type="submit" class="submit-btn">送信する →</button>
          <a href="https://lin.ee/oGXx0Ql" class="line-btn">公式LINEで問い合わせる</a>
        </div>

        <p class="form-note form-full">
          ご入力いただいた個人情報につきましては当社のプライバシーポリシーに基づき適切に管理いたします。
        </p>
      </form>
    </div>
  </section>

  </main>

    <!-- フッター読み込み -->
    <div id="footer"></div>

    <script src="./js/main.js"></script>
    <script src="./js/diagnosis.js"></script>
	</body>
</html>
