<!doctype html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="./index_styles.css">
	<link rel="stylesheet" href="./conpany.css">
	<title>株式会社L.EVER｜会社概要</title>
</head>

<body>
	<!-- ヘッダー読み込み -->
	<div id="header"></div>

	<main class="conpany-main" aria-label="会社概要">
		<section class="conpany-visual" aria-label="株式会社L.EVER 会社概要">
			<picture>
				<!-- SP画像：767px以下で表示 -->
				<source media="(max-width: 767px)" srcset="./img/company-info-sp.png">

				<!-- PC画像：768px以上で表示 -->
				<source media="(min-width: 768px)" srcset="./img/company-info-pc.png">

				<!-- フォールバック -->
				<img
					class="conpany-visual__image"
					src="./img/company-info-pc.png"
					alt="株式会社L.EVERの会社概要。会社名、所在地、代表者、設立、事業内容、お問い合わせ電話番号を掲載。"
					decoding="async"
					fetchpriority="high"
				>
			</picture>

			<!-- SP版のみ：電話番号部分をタップで発信 -->
			<a
				class="conpany-visual__tel"
				href="tel:0120399137"
				aria-label="電話で問い合わせる 0120-399-137"
			>
				0120-399-137
			</a>
		</section>
	</main>

	<!-- フッター読み込み -->
	<div id="footer"></div>
	<script src="./js/main.js"></script>
</body>
</html>
